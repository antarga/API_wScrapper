<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
<meta name="description" content="">
<meta name="author" content="Andreas Ntargaras">
<title>Sentence Classification API</title>


<link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Roboto:400,500|Open+Sans">
<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
<link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css">
<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>

<!-- <link href="/static/css/acc_style.css" rel="stylesheet"> -->

<style>

	body { 
        background: rgb(93, 129, 206) !important; 
    } /* Adding !important forces the browser to overwrite the default style applied by Bootstrap */

	#result_container {
		margin-bottom: 20px;
	}

	.h2 {
		margin-top: 20px;
	}

	.card {
		background-color: #333538c9;
		color: white;
	}
	
	.button1 {
	  margin-top: 20px;
	  transition: 0.3s;
	  background-color: #333538c9;
	  border: none;
	  color: white;
	  padding: 12px 42px;
	  text-align: center;
	  text-decoration: none;
	  display: inline-block;
	  font-size: 16px;
	  margin: 4px 2px;
	  cursor: pointer;
	  border-radius: 50px;
	}
	
	.button1:hover {opacity: 0.8}

	.button2 {
	  margin-top: 20px;
	  transition: 0.3s;
	  background-color: #333538c9;
	  border: none;
	  color: white;
	  padding: 12px 42px;
	  text-align: center;
	  text-decoration: none;
	  display: inline-block;
	  font-size: 16px;
	  margin: 4px 2px;
	  cursor: pointer;
	  border-radius: 50px;
	}
	
	.button2:hover {opacity: 0.8}

	.button3 {
	  margin-top: 20px;
	  transition: 0.3s;
	  background-color: #333538c9;
	  border: none;
	  color: white;
	  padding: 12px 42px;
	  text-align: center;
	  text-decoration: none;
	  display: inline-block;
	  font-size: 16px;
	  margin: 4px 2px;
	  cursor: pointer;
	  border-radius: 50px;
	}
	
	.button3:hover {opacity: 0.8}

	.card-header h2.clearfix { 
		display: inline-block; 
		padding: 8px;
	}

</style>

</head>
<body>

<div class="container-lg" id="result_container">
	<div class="row">
		<div class="col-lg-8 offset-lg-2">
			<div class="latestinfo" id="accordionDiv">
				<div class="text-center">
					<h1 class="h2 mb-3 text-white">ScrAby Output</h1>
				</div>
			</div>
		</div>
	</div>
</div>

<script type="text/javascript">
	var _c = new Date().getTime();
    document.write('<script type="text/javascript" src="/static/js/scraby_output.js?c='+_c+'"><\/script>');
</script>
<script type="text/javascript" src="/static/js/accordion_scraby.js"></script>

<div class="text-center">
	<button class="button1">  Log Choices </button>
	<a href="{{ url_for('scraby_save') }}"><button class="button2">  Download Results </button></a>
	<a href="{{ url_for('scraby') }}"><button class="button3">  Back </button></a>
</div>

<script>
	var array = [];
	$('.button1').on('click', function() {
		array.length = 0;
		$("#accordionDiv input:checked").each(function() {
			array.push($(this).attr('name'));
		});

		$.ajax({                        
			type : 'POST',
			url: "{{ url_for('scraby_log') }}",
			data : JSON.stringify(array),
			contentType: 'application/json',
			dataType : 'JSON'
		});
		
	});
	
	console.info(array);
</script>


</body>
</html>
